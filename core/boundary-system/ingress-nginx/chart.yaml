apiVersion: "helm.toolkit.fluxcd.io/v2"
kind: "HelmRelease"
metadata:
  name: "ingress-nginx"
  namespace: "boundary-system"

spec:
  interval: "10m"

  chart:
    spec:
      interval: "10m"

      sourceRef:
        kind: "HelmRepository"
        name: "ingress-nginx"

      chart: "ingress-nginx"
      version: "4.12.1"

  values:
    controller:
      service:
        annotations:
          service.beta.kubernetes.io/load-balancer-source-ranges: "${ingress_source_cidr}"

      extraArgs:
        default-ssl-certificate: "boundary-system/ingress-nginx-tls"

      tolerations:
      - key: "CriticalAddonsOnly"
        operator: "Exists"

      nodeSelector:
        eks/nodegroup: "system"

      admissionWebhooks:
        patch:
          tolerations:
          - key: "CriticalAddonsOnly"
            operator: "Exists"

          nodeSelector:
            eks/nodegroup: "system"