apiVersion: "kustomize.toolkit.fluxcd.io/v1"
kind: "Kustomization"
metadata:
  name: "system-config"
  namespace: "controller-system"

spec:
  interval: "10m0s"

  sourceRef:
    kind: "GitRepository"
    name: "system-core"

  path: "config"

  postBuild:
    substituteFrom:
    - kind: "ConfigMap"
      name: "metadata"
      optional: false

  prune: true