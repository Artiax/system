apiVersion: "kustomize.toolkit.fluxcd.io/v1"
kind: "Kustomization"
metadata:
  name: "cluster-common"
  namespace: "controller-system"

spec:
  interval: "10m0s"

  sourceRef:
    kind: "GitRepository"
    name: "clusters"

  path: "${name}/common"

  postBuild:
    substituteFrom:
    - kind: "ConfigMap"
      name: "metadata"
      optional: false

  prune: true