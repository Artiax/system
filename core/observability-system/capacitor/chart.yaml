apiVersion: "helm.toolkit.fluxcd.io/v2"
kind: "HelmRelease"
metadata:
  name: "capacitor"
  namespace: "observability-system"

spec:
  interval: "10m"

  chart:
    spec:
      interval: "10m"

      sourceRef:
        kind: "HelmRepository"
        name: "onechart"

      chart: "onechart"
      version: "0.73.0"

  values:
    serviceAccount: "capacitor"

    image:
      repository: "ghcr.io/gimlet-io/capacitor"
      tag: "v0.4.8"

    containerPort: 9000

    probe:
      enabled: true
      path: "/"

    resources:
      ignoreLimits: true

    securityContext:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 101
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
        - "ALL"
      seccompProfile:
        type: "RuntimeDefault"

    tolerations:
    - key: "CriticalAddonsOnly"
      operator: "Exists"

    nodeSelector:
      eks/nodegroup: "system"