apiVersion: "karpenter.sh/v1"
kind: "NodePool"
metadata:
  name: "data"

spec:
  template:
    spec:
      nodeClassRef:
        group: "karpenter.k8s.aws"
        kind: "EC2NodeClass"
        name: "default"

      expireAfter: "720h"

      terminationGracePeriod: "48h"

      requirements:
      - key: "karpenter.sh/capacity-type"
        operator: "In"
        values: ["spot"]

  disruption:
    consolidationPolicy: "WhenEmptyOrUnderutilized"
    consolidateAfter: "1m"

  limits:
    cpu: "10"
    memory: "100Gi"