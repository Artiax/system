apiVersion: "karpenter.sh/v1"
kind: "NodePool"
metadata:
  name: "data"

spec:
  template:
    spec:
      nodeClassRef:
        group: "karpenter.k8s.aws"
        kind: "EC2NodeClass"
        name: "default"

      expireAfter: "720h"

      terminationGracePeriod: "48h"

      requirements:
      - key: "karpenter.sh/capacity-type"
        operator: "In"
        values: ["spot"]
      # Fixes: https://karpenter.sh/docs/troubleshooting/#instances-with-swap-volumes-fail-to-register-with-control-plane
      - key: "karpenter.k8s.aws/instance-size"
        operator: "NotIn"
        values: ["nano", "micro"]

  disruption:
    consolidationPolicy: "WhenEmptyOrUnderutilized"
    consolidateAfter: "1m"

  limits:
    cpu: "10"
    memory: "100Gi"