apiVersion: "karpenter.k8s.aws/v1"
kind: "EC2NodeClass"
metadata:
  name: "default"

spec:
  subnetSelectorTerms:
  - tags:
      Cluster: "${name}"
      Type: "private"

  securityGroupSelectorTerms:
  - tags:
      Name: "${full_name}-node"

  instanceProfile: "${full_name}-karpenter"

  amiSelectorTerms:
  - alias: "al2023@latest"

  tags:
    Name: "${full_name}"