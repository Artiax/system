apiVersion: "cert-manager.io/v1"
kind: "ClusterIssuer"
metadata:
  name: "letsencrypt-production"

spec:
  acme:
    email: "${letsencrypt_acme_email}"

    server: "https://acme-v02.api.letsencrypt.org/directory"
    solvers:
    - dns01:
        route53: {}

    privateKeySecretRef:
      name: "letsencrypt-production"