apiVersion: "cert-manager.io/v1"
kind: "Certificate"
metadata:
  name: "ingress-nginx-tls"
  namespace: "boundary-system"

spec:
  issuerRef:
    group: "cert-manager.io"
    kind: "ClusterIssuer"
    name: "${ingress_tls_issuer}"

  dnsNames:
  - "*.${name}.${domain}"

  secretName: "ingress-nginx-tls"